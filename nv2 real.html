<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>REAL AIR — FIXED</title>
<style>
body { margin:0; overflow:hidden; background:#070b14; }
canvas { display:block; }
</style>
</head>
<body>
<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

// =====================
const N = 128;
const size = N * N;

let vx = new Float32Array(size);
let vy = new Float32Array(size);
let vx0 = new Float32Array(size);
let vy0 = new Float32Array(size);
let density = new Float32Array(size);
let density0 = new Float32Array(size);
let pressure = new Float32Array(size);
let div = new Float32Array(size);

function IX(x,y){ return x + y * N; }

// =====================
// DIFFUSE
function diffuse(x, x0, diff){
  for(let k=0;k<10;k++){
    for(let y=1;y<N-1;y++){
      for(let x2=1;x2<N-1;x2++){
        x[IX(x2,y)] = (
          x0[IX(x2,y)] +
          diff * (
            x[IX(x2+1,y)] +
            x[IX(x2-1,y)] +
            x[IX(x2,y+1)] +
            x[IX(x2,y-1)]
          )
        ) / (1 + 4*diff);
      }
    }
  }
}

// =====================
// PROJECT
function project(vx,vy,p,div){
  for(let y=1;y<N-1;y++){
    for(let x=1;x<N-1;x++){
      div[IX(x,y)] = -0.5 * (
        vx[IX(x+1,y)] - vx[IX(x-1,y)] +
        vy[IX(x,y+1)] - vy[IX(x,y-1)]
      );
      p[IX(x,y)] = 0;
    }
  }

  for(let k=0;k<20;k++){
    for(let y=1;y<N-1;y++){
      for(let x=1;x<N-1;x++){
        p[IX(x,y)] = (
          div[IX(x,y)] +
          p[IX(x+1,y)] +
          p[IX(x-1,y)] +
          p[IX(x,y+1)] +
          p[IX(x,y-1)]
        ) / 4;
      }
    }
  }

  for(let y=1;y<N-1;y++){
    for(let x=1;x<N-1;x++){
      vx[IX(x,y)] -= 0.5 * (p[IX(x+1,y)] - p[IX(x-1,y)]);
      vy[IX(x,y)] -= 0.5 * (p[IX(x,y+1)] - p[IX(x,y-1)]);
    }
  }
}

// =====================
// ADVECT
function advect(d,d0,vx,vy){
  for(let y=1;y<N-1;y++){
    for(let x=1;x<N-1;x++){
      let i = IX(x,y);

      let x0 = x - vx[i] * 0.2;
      let y0 = y - vy[i] * 0.2;

      x0 = Math.max(0.5, Math.min(N-1.5, x0));
      y0 = Math.max(0.5, Math.min(N-1.5, y0));

      let i0 = Math.floor(x0);
      let j0 = Math.floor(y0);
      let i1 = i0 + 1;
      let j1 = j0 + 1;

      let s1 = x0 - i0;
      let s0 = 1 - s1;
      let t1 = y0 - j0;
      let t0 = 1 - t1;

      d[i] =
        s0*(t0*d0[IX(i0,j0)] + t1*d0[IX(i0,j1)]) +
        s1*(t0*d0[IX(i1,j0)] + t1*d0[IX(i1,j1)]);
    }
  }
}

// =====================
// STEP
function step(){
  diffuse(vx0, vx, 0.0005);
  diffuse(vy0, vy, 0.0005);

  project(vx0,vy0,pressure,div);

  advect(vx, vx0, vx0, vy0);
  advect(vy, vy0, vx0, vy0);

  project(vx,vy,pressure,div);

  diffuse(density0, density, 0.0001);
  advect(density, density0, vx, vy);

  // decay
  for(let i=0;i<size;i++){
    density[i] *= 0.995;
  }
}

// =====================
// DRAW (REAL VISUAL FIX)
function draw(){
  ctx.fillStyle="rgba(7,11,20,0.2)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  const cellW = canvas.width / N;
  const cellH = canvas.height / N;

  for(let y=0;y<N;y++){
    for(let x=0;x<N;x++){
      let i = IX(x,y);
      let d = density[i];

      if(d < 0.01) continue;

      let px = x * cellW;
      let py = y * cellH;

      ctx.fillStyle = `rgba(${80 + d*200},${140 + d*120},255,${d})`;
      ctx.fillRect(px,py,cellW,cellH);
    }
  }
}

// =====================
// INPUT (STRONG FIX)
let active=false,lastX=0,lastY=0;

canvas.onpointerdown=e=>{
  active=true;
  lastX=e.clientX;
  lastY=e.clientY;
};

canvas.onpointerup=()=>active=false;

canvas.onpointermove=e=>{
  if(!active) return;

  let dx = e.clientX - lastX;
  let dy = e.clientY - lastY;

  let x = Math.floor(e.clientX / canvas.width * N);
  let y = Math.floor(e.clientY / canvas.height * N);

  let i = IX(x,y);

  vx[i] += dx * 2.0;
  vy[i] += dy * 2.0;
  density[i] += 50;

  lastX=e.clientX;
  lastY=e.clientY;
};

// =====================
function loop(){
  step();
  draw();
  requestAnimationFrame(loop);
}
loop();

</script>
</body>
</html>
